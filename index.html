<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Physics 1 Lab (Modular)</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<button id="menu-btn" title="Toggle Menu">☰</button>

<div id="app-container">
    <aside>
        <h1>AP Physics 1 Lab</h1>
        
        <div class="unit-header" onclick="toggleMenu('u1-menu')">Unit 1: Kinematics <span>▼</span></div>
        <div id="u1-menu" class="sub-menu">
            <button class="nav-btn" onclick="loadSim('1.1')">1.1 Scalars and Vectors in 1D</button>
            <button class="nav-btn" onclick="loadSim('1.2')">1.2 Displacement, Velocity, Acceleration</button>
            <button class="nav-btn" onclick="loadSim('1.3')">1.3 Representing Motion</button>
            <button class="nav-btn" onclick="loadSim('1.4')">1.4 Reference Frames & Relative Motion</button>
            <button class="nav-btn" onclick="loadSim('1.5')">1.5 Vectors & Motion in 2D</button>
        </div>

        <div class="unit-header" onclick="toggleMenu('u2-menu')">Unit 2: Dynamics <span>▼</span></div>
        <div id="u2-menu" class="sub-menu">
            <button class="nav-btn" onclick="loadSim('2.1')">2.1 Systems & Center of Mass</button>
            <button class="nav-btn" onclick="loadSim('2.2')">2.2 Forces & Free-Body Diagrams</button>
            <button class="nav-btn" onclick="loadSim('2.3')">2.3 Newton's Third Law</button>
            <button class="nav-btn" onclick="loadSim('2.4')">2.4 Newton's First Law</button>
            <button class="nav-btn" onclick="loadSim('2.5')">2.5 Newton's Second Law</button>
            <button class="nav-btn" onclick="loadSim('2.6')">2.6 Gravitational Force</button>
            <button class="nav-btn" onclick="loadSim('2.7')">2.7 Kinetic & Static Friction</button>
            <button class="nav-btn" onclick="loadSim('2.8')">2.8 Spring Forces</button>
            <button class="nav-btn" onclick="loadSim('2.9')">2.9 Circular Motion</button>
        </div>

        <div class="unit-header" onclick="toggleMenu('u3-menu')">Unit 3: Energy <span>▼</span></div>
        <div id="u3-menu" class="sub-menu">
            <button class="nav-btn" onclick="loadSim('3.1')">3.1 Translational Kinetic Energy</button>
            <button class="nav-btn" onclick="loadSim('3.2')">3.2 Work</button>
            <button class="nav-btn" onclick="loadSim('3.3')">3.3 Potential Energy</button>
            <button class="nav-btn" onclick="loadSim('3.4')">3.4 Conservation of Energy</button>
            <button class="nav-btn" onclick="loadSim('3.5')">3.5 Power</button>
        </div>

        <div class="unit-header" onclick="toggleMenu('u4-menu')">Unit 4: Momentum <span>▼</span></div>
        <div id="u4-menu" class="sub-menu">
            <button class="nav-btn" onclick="loadSim('4.1')">4.1 Linear Momentum</button>
            <button class="nav-btn" onclick="loadSim('4.2')">4.2 Change in Momentum & Impulse</button>
            <button class="nav-btn" onclick="loadSim('4.3')">4.3 Conservation of Linear Momentum</button>
            <button class="nav-btn" onclick="loadSim('4.4')">4.4 Elastic & Inelastic Collisions</button>
        </div>

        <div class="unit-header" onclick="toggleMenu('u5-menu')">Unit 5: Torque & Rotation <span>▼</span></div>
        <div id="u5-menu" class="sub-menu">
            <button class="nav-btn" onclick="loadSim('5.1')">5.1 Rotational Kinematics</button>
            <button class="nav-btn" onclick="loadSim('5.2')">5.2 Connecting Linear & Rotational</button>
            <button class="nav-btn" onclick="loadSim('5.3')">5.3 Torque</button>
            <button class="nav-btn" onclick="loadSim('5.4')">5.4 Rotational Inertia</button>
            <button class="nav-btn" onclick="loadSim('5.5')">5.5 Rotational Equilibrium</button>
            <button class="nav-btn" onclick="loadSim('5.6')">5.6 Newton's 2nd Law (Rotation)</button>
        </div>

        <div class="unit-header" onclick="toggleMenu('u6-menu')">Unit 6: Rotational Energy <span>▼</span></div>
        <div id="u6-menu" class="sub-menu">
            <button class="nav-btn" onclick="loadSim('6.1')">6.1 Rotational Kinetic Energy</button>
            <button class="nav-btn" onclick="loadSim('6.2')">6.2 Torque & Work</button>
            <button class="nav-btn" onclick="loadSim('6.3')">6.3 Angular Momentum & Impulse</button>
            <button class="nav-btn" onclick="loadSim('6.4')">6.4 Conservation of Angular Momentum</button>
            <button class="nav-btn" onclick="loadSim('6.5')">6.5 Rolling</button>
            <button class="nav-btn" onclick="loadSim('6.6')">6.6 Motion of Orbiting Satellites</button>
        </div>

        <div class="unit-header" onclick="toggleMenu('u7-menu')">Unit 7: Oscillations <span>▼</span></div>
        <div id="u7-menu" class="sub-menu">
            <button class="nav-btn" onclick="loadSim('7.1')">7.1 Defining SHM</button>
            <button class="nav-btn" onclick="loadSim('7.2')">7.2 Frequency & Period of SHM</button>
            <button class="nav-btn" onclick="loadSim('7.3')">7.3 Representing & Analyzing SHM</button>
            <button class="nav-btn" onclick="loadSim('7.4')">7.4 Energy of Simple Harmonic Oscillators</button>
        </div>

        <div class="unit-header" onclick="toggleMenu('u8-menu')">Unit 8: Fluids <span>▼</span></div>
        <div id="u8-menu" class="sub-menu">
            <button class="nav-btn" onclick="loadSim('8.1')">8.1 Internal Structure & Density</button>
            <button class="nav-btn" onclick="loadSim('8.2')">8.2 Pressure</button>
            <button class="nav-btn" onclick="loadSim('8.3')">8.3 Fluids & Newton's Laws</button>
            <button class="nav-btn" onclick="loadSim('8.4')">8.4 Fluids & Conservation Laws</button>
        </div>

        <div style="margin-top: auto; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <button class="btn btn-red" onclick="clearProgress()" style="font-size: 0.8rem; padding: 8px; width: 100%;">
                Reset All Progress
            </button>
        </div>
    </aside>

    <main id="main-view">
        <h2 id="sim-title" style="margin-top:0; color: var(--primary);">Welcome</h2>
    
       <div class="sim-container hidden" id="sim-interface">
            <div id="sim-desc" class="desc-box">Select a simulation to begin.</div>

            <div class="canvas-area">
                <canvas id="sim-canvas" width="700" height="450"></canvas>
            </div>

            <div id="sim-controls" class="controls"></div>
       </div>

       <div id="sim-placeholder" style="display:none; padding: 40px; text-align: center; color: #555;">
           </div>

    </main>
</div>

<script src="script.js"></script>

</body>
</html>
